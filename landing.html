    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rigs = document.querySelectorAll('.scroll-rig');
            
            // Array para mantener los datos de progreso de cada sección
            let scrollData = Array.from(rigs).map(rig => ({
                section: rig,
                img: rig.querySelector('.scrolling-image'),
                container: rig.querySelector('.preview-container'),
                targetProgress: 0,
                currentProgress: 0,
                maxScroll: 0
            }));

            // Calcula cuánto debe viajar la imagen para mostrarse completa
            const calculateHeights = () => {
                scrollData.forEach(data => {
                    if (data.img && data.container) {
                        data.maxScroll = Math.max(0, data.img.clientHeight - data.container.clientHeight);
                    }
                });
            };

            // Recalcular en load y resize
            window.addEventListener('resize', calculateHeights);
            
            // Asegurarnos de calcular cuando las imágenes carguen
            scrollData.forEach(data => {
                if (data.img.complete) {
                    calculateHeights();
                } else {
                    data.img.addEventListener('load', calculateHeights);
                }
            });

            // Función de Interpolación Lineal (LERP) para el smoothing
            // "factor" controla la suavidad (0.05 a 0.1 es ideal)
            const lerp = (start, end, factor) => start + (end - start) * factor;

            // Loop de Animación
            const renderLoop = () => {
                const windowHeight = window.innerHeight;
                
                scrollData.forEach(data => {
                    const rect = data.section.getBoundingClientRect();
                    const totalScroll = rect.height - windowHeight;
                    
                    let progress = 0;
                    
                    // Si la sección está fijada (pinned) o pasada
                    if (rect.top <= 0) {
                        // Calcula el % de scroll (0 a 1)
                        progress = Math.min(1, Math.max(0, -rect.top / totalScroll));
                    }

                    // Actualizar el progreso objetivo
                    data.targetProgress = progress;
                    
                    // Aplicar LERP para que alcance al objetivo suavemente. 
                    // Cambiamos de 0.08 a 0.20 para menos lag pero manteniendo la suavidad.
                    data.currentProgress = lerp(data.currentProgress, data.targetProgress, 0.20);

                    // Traducir a píxeles y aplicar (TranslateY)
                    if (data.img && data.maxScroll > 0) {
                        const yPos = -(data.maxScroll * data.currentProgress);
                        // Math.round en un nivel sub-pixel evita saltos raros
                        data.img.style.transform = `translate3d(0, ${yPos}px, 0)`; 
                    }
                });

                // Llamar al próximo frame de pintado
                requestAnimationFrame(renderLoop);
            };

            // Iniciar el loop
            requestAnimationFrame(renderLoop);
        });
    </script>
