            theme: {

                    fontFamily: {

    <style>
        /* Full width outer background container */
        .portfolio-frame {
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6% 4%; 
            position: relative;
        }

        @media (min-width: 768px) {
            .portfolio-frame {
                padding: 6%;
            }
        }

        /* 16:9 Inner Scrollable Design Container */
        .preview-container {
            width: 100%;
            max-width: 120rem;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background-color: #ffffff;
            box-shadow: 0 20px 40px -10px rgb(0 0 0 / 0.2);
            position: relative;
        }

        /* The Image now uses CSS Transform driven by JS for LERP Smoothing */
        .scrolling-image {
            width: 100%;
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            /* Force GPU acceleration for smooth sub-pixel rendering */
            will-change: transform;
            transform: translateZ(0); 
        }

        ::selection {
            background-color: #1a1a1a;
            color: #faf9f6;
        }

        /* Text Utilities for extreme editorial look */
        .text-massive {
            font-size: clamp(3.5rem, 12vw, 100px);
            line-height: 0.8;
            letter-spacing: -0.04em;
        }
        
        @media (min-width: 1024px) {
            .text-massive {
                font-size: 100px;
            }
        }
    </style>
</head>

                        <svg class="w-4 h-4 transform group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>

    <!-- Footer agregado dentro del flujo normal para poder scrollear hasta el final -->
    <footer class="w-full px-6 py-12 md:px-12 border-t border-stone-900/10 relative z-20 bg-stone-50">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">

                <a href="#" class="hover:text-stone-900 transition-colors">Email</a>
            </div>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rigs = document.querySelectorAll('.scroll-rig');
            
            // Array para mantener los datos de progreso de cada sección
            let scrollData = Array.from(rigs).map(rig => ({
                section: rig,
                img: rig.querySelector('.scrolling-image'),
                container: rig.querySelector('.preview-container'),
                targetProgress: 0,
                currentProgress: 0,
                maxScroll: 0
            }));

            // Calcula cuánto debe viajar la imagen para mostrarse completa
            const calculateHeights = () => {
                scrollData.forEach(data => {
                    if (data.img && data.container) {
                        data.maxScroll = Math.max(0, data.img.clientHeight - data.container.clientHeight);
                    }
                });
            };

            // Recalcular en load y resize
            window.addEventListener('resize', calculateHeights);
            
            // Asegurarnos de calcular cuando las imágenes carguen
            scrollData.forEach(data => {
                if (data.img.complete) {
                    calculateHeights();
                } else {
                    data.img.addEventListener('load', calculateHeights);
                }
            });

            // Función de Interpolación Lineal (LERP) para el smoothing
            // "factor" controla la suavidad (0.05 a 0.1 es ideal)
            const lerp = (start, end, factor) => start + (end - start) * factor;

            // Loop de Animación
            const renderLoop = () => {
                const windowHeight = window.innerHeight;
                
                scrollData.forEach(data => {
                    const rect = data.section.getBoundingClientRect();
                    const totalScroll = rect.height - windowHeight;
                    
                    let progress = 0;
                    
                    // Si la sección está fijada (pinned) o pasada
                    if (rect.top <= 0) {
                        // Calcula el % de scroll (0 a 1)
                        progress = Math.min(1, Math.max(0, -rect.top / totalScroll));
                    }

                    // Actualizar el progreso objetivo
                    data.targetProgress = progress;
                    
                    // Aplicar LERP para que alcance al objetivo suavemente. 
                    // Cambiamos de 0.08 a 0.20 para menos lag pero manteniendo la suavidad.
                    data.currentProgress = lerp(data.currentProgress, data.targetProgress, 0.20);

                    // Traducir a píxeles y aplicar (TranslateY)
                    if (data.img && data.maxScroll > 0) {
                        const yPos = -(data.maxScroll * data.currentProgress);
                        // Math.round en un nivel sub-pixel evita saltos raros
                        data.img.style.transform = `translate3d(0, ${yPos}px, 0)`; 
                    }
                });

                // Llamar al próximo frame de pintado
                requestAnimationFrame(renderLoop);
            };

            // Iniciar el loop
            requestAnimationFrame(renderLoop);
        });
    </script>
