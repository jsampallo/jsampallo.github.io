            theme: {

    <style>
        ::selection {
            background-color: #1a1a1a;
            color: #faf9f6;
        }

        /* Text Utilities for extreme editorial look */
        .text-massive {
            font-size: clamp(3rem, 10vw, 80px);
            line-height: 0.8;
            letter-spacing: -0.04em;
        }
        
        @media (min-width: 1024px) {
            .text-massive {
                font-size: 80px;
            }
        }

        /* GRID LAYOUT FALLBACKS
           Recreating your styles.css logic to ensure the layout doesn't break 
        */
        .layout-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }
        .row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        @media (max-width: 799px) { .box, .ar-landscape, .ar-square { aspect-ratio: 1 / 1; } }
        @media (min-width: 800px) {
            .row { flex-direction: row; }
            .box { width: auto; aspect-ratio: auto; } /* Reset mobile constraints */
            
            /* Renamed to avoid Tailwind conflicts */
            .flex-w-1 { flex: 1; }
            .flex-w-2 { flex: 2; }
            .flex-w-3 { flex: 3; width: 100%; }

            .ar-square { aspect-ratio: 1 / 1; }
            .ar-landscape { aspect-ratio: 1 / 2; }
            
            .col .box {
                flex: 1; 
                height: 100%;
            }
        }
        .col {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .box {
            position: relative;
            overflow: hidden;
            background-color: #f5f5f4; /* Placeholder color before image loads */
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .box img, .box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .pos-high {
            object-position: top;
        }
        
        /* Flex proportions */
        .w-1 { flex: 1; }
        .w-2 { flex: 2; }
        .w-3 { flex: 3; width: 100%; }

        /* Aspect Ratios */
        .ar-square { aspect-ratio: 1 / 1; }
        .ar-landscape { aspect-ratio: 16 / 9; }
        
        /* Ensure inner column boxes fill available space */
        .col .box {
            flex: 1; 
            height: 100%;
        }

        /* LIGHTBOX OVERLAY STYLES 
        */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(14, 14, 16, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 2rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
            cursor: zoom-out;
        }
        .lightbox-overlay img, .lightbox-overlay video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

    <!-- Lightbox Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Create the overlay element and add it to the page
            const overlay = document.createElement('div');
            overlay.className = 'lightbox-overlay';
            document.body.appendChild(overlay);

            // 2. Select all media elements inside the boxes
            const mediaItems = document.querySelectorAll('.box img, .box video');

            mediaItems.forEach(item => {
                // Find the parent .box and attach click listener to it
                item.closest('.box').addEventListener('click', () => {

                    overlay.innerHTML = ''; // Clear previous content

                    // Clone the media so we don't remove it from the grid
                    // true copies all attributes like muted, autoplay, and loop
                    const clone = item.cloneNode(true);
                    
                    // If it's a video, explicitly call play() but do NOT add controls
                    if (clone.tagName === 'VIDEO') {
                        clone.play(); 
                    }

                    // Add it to overlay and show
                    overlay.appendChild(clone);
                    overlay.classList.add('active');
                    
                    // Prevent background layout shift by calculating scrollbar width
                    const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
                    document.documentElement.style.paddingRight = `${scrollbarWidth}px`;
                    document.documentElement.style.overflow = 'hidden';
                });
            });

            // 3. Close the modal when clicking OUTSIDE the image (on the overlay)
            overlay.addEventListener('click', (e) => {
                // Ensure they actually clicked the background, not the image itself
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    
                    // We wait for the 0.3s fade transition to finish before restoring the scrollbar
                    setTimeout(() => {
                        overlay.innerHTML = ''; 
                        document.documentElement.style.overflow = ''; 
                        document.documentElement.style.paddingRight = '';
                    }, 300);
                }
            });
        });
    </script>
